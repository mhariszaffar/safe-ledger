<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5D478"/>
      <stop offset="40%"  stop-color="#C9973A"/>
      <stop offset="100%" stop-color="#8A6010"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="#0A0B12"/>
  <rect x="2" y="2" width="96" height="96" rx="20" fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.5"/>

  <!-- Hexagon shield -->
  <polygon points="50,12 82,30 82,70 50,88 18,70 18,30"
    fill="rgba(201,151,58,0.07)" stroke="url(#g1)" stroke-width="1.5"/>
  <polygon points="50,18 76,34 76,66 50,82 24,66 24,34"
    fill="none" stroke="rgba(201,151,58,0.2)" stroke-width="0.8"/>

  <!-- Vault circle -->
  <circle cx="50" cy="50" r="22" fill="#08090F" stroke="url(#g1)" stroke-width="1.8"/>
  <circle cx="50" cy="50" r="16" fill="none" stroke="rgba(201,151,58,0.25)" stroke-width="0.8"/>

  <!-- Vault dial marks -->
  <g stroke="url(#g1)" stroke-width="1.4" opacity="0.75">
    <line x1="50" y1="31" x2="50" y2="36"/>
    <line x1="50" y1="64" x2="50" y2="69"/>
    <line x1="31" y1="50" x2="36" y2="50"/>
    <line x1="64" y1="50" x2="69" y2="50"/>
    <line x1="37.9" y1="37.9" x2="41.4" y2="41.4"/>
    <line x1="58.6" y1="58.6" x2="62.1" y2="62.1"/>
    <line x1="37.9" y1="62.1" x2="41.4" y2="58.6"/>
    <line x1="58.6" y1="41.4" x2="62.1" y2="37.9"/>
  </g>

  <!-- SL letterform -->
  <text x="50" y="56"
    font-family="Georgia, serif"
    font-size="18"
    font-weight="700"
    text-anchor="middle"
    fill="url(#g1)"
    letter-spacing="1"
    filter="url(#glow)"
  >SL</text>

  <!-- Hexagon vertex dots -->
  <g fill="url(#g1)" opacity="0.9">
    <circle cx="50"  cy="12"  r="1.8"/>
    <circle cx="82"  cy="30"  r="1.8"/>
    <circle cx="82"  cy="70"  r="1.8"/>
    <circle cx="50"  cy="88"  r="1.8"/>
    <circle cx="18"  cy="70"  r="1.8"/>
    <circle cx="18"  cy="30"  r="1.8"/>
  </g>
</svg>
